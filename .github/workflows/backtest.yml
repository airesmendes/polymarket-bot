name: 📊 Polymarket Backtest

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Período em dias'
        required: true
        default: '90'
      wallets:
        description: 'Wallets (separadas por vírgula, opcional)'
        required: false

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run backtest
        run: |
          WALLETS="${{ github.event.inputs.wallets }}"
          DAYS="${{ github.event.inputs.days_back }}"
          if [ -n "$WALLETS" ]; then
            python backtest.py --days "$DAYS" --wallets $(echo "$WALLETS" | tr ',' ' ')
          else
            python backtest.py --days "$DAYS"
          fi
      - name: Commit results
        run: |
          git config user.email "bot@polymarket"
          git config user.name "Polymarket Bot"
          git add data/
          git diff --staged --quiet || git commit -m "chore: backtest results"
          git push
